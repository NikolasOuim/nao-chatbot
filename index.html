<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nao - Le Chatbot de Relief</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        relief: {
                            blue: '#cde0f5',
                            dark: '#1a1a1a',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-relief-blue text-relief-dark min-h-screen flex flex-col items-center font-sans">

    <header class="w-full max-w-4xl mx-auto pt-8 px-4 flex justify-center">
        <img src="image.png" alt="Nao" class="max-h-48 w-auto object-contain mix-blend-multiply">
    </header>

    <main class="flex-grow flex flex-col items-center w-full px-4 py-8">
        
        <div class="text-center max-w-2xl mx-auto mb-10">
            <h1 class="text-4xl md:text-5xl font-serif mb-4 text-relief-dark">
                Votre premier point de contact bienveillant. Nao est un agent conversationnel conçu pour vous orienter rapidement vers les ressources les plus adaptées à vos besoins.
            </h1>
        </div>

        <div class="w-full max-w-[640px] h-[480px] bg-white rounded-xl shadow-2xl overflow-hidden border border-white/50">
            <iframe width="640" height="480" src="https://embed.wotnot.io/D994Bw3bhHX2122934736309CgLHEsYD/bot/5DKH43iiwmSV130537165670ESskA7Az?display_header=false&history_retention=false" frameborder="0"></iframe>
        </div>
        
    </main>

    <footer class="w-full py-6 text-center text-sm text-gray-600">
        <p>&copy; 2026 Relief - Le chemin de la santé mentale.</p>
    </footer>

</body>
</html>
